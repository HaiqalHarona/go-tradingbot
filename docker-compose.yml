version: '3.8'

services:
  tradingbot:
    image: ghcr.io/haiqalharona/go-tradingbot:latest
    container_name: go-tradingbot
    restart: unless-stopped
    environment:
      - APCA_API_KEY_ID=${APCA_API_KEY_ID}
      - APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}
      - APCA_API_BASE_URL=${APCA_API_BASE_URL:-https://paper-api.alpaca.markets}
      - STOCK_POOL=${STOCK_POOL:-AAPL,HLAL,NVDA,SPUS,TSLA}
      - EQUITY_ALLOCATION_PCT=${EQUITY_ALLOCATION_PCT:-0.02}
      - STOP_LOSS_PCT=${STOP_LOSS_PCT:-0.015}
      - TAKE_PROFIT_PCT=${TAKE_PROFIT_PCT:-0.030}
      - MAX_OPEN_POSITIONS=${MAX_OPEN_POSITIONS:-4}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
